name = "commentsvg"
main = "src/index.ts"
compatibility_date = "2024-07-01"

# GitHub Personal Access Token (required)
# Generate at: https://github.com/settings/tokens
# Scopes: metadata, read:discussion
[vars]
GITHUB_GRAPHQL_URL = "https://api.github.com/graphql"

# GITHUB_TOKEN must be set as a secret:
#   npx wrangler secret put GITHUB_TOKEN
# Generate at: https://github.com/settings/tokens (scopes: metadata, read:discussion)

# KV Namespace for caching rendered SVGs (optional)
# Create a KV namespace and uncomment:
# [[kv_namespaces]]
# binding = "COMMENT_CACHE"
# id = "your-kv-namespace-id"
